name: Build NJM Worker APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: false

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v67
          name: "NJM Worker v67 - Fix Car Search + Auto Session"
          body: |
            ## NJM Worker App v67 - Critical Bug Fixes

            ### What's Fixed:
            ✅ **Car search now works** - Fixed session authentication issue
            ✅ **Auto-relogin on app start** - No more "خطأ بالاتصال" after restart
            ✅ **Sunmi SDK** (com.sunmi:printerlibrary:1.0.23) properly integrated
            ✅ **PrinterManager** uses InnerPrinterManager.getInstance().bindService()
            ✅ **App icon** (NJM gold star) appears on home screen
            ✅ **NJM Logo** visible inside the app
            ✅ **ZATCA invoice settings**: org name, VAT number, CR number, address
            ✅ **Printer auto-detect** button with status indicator
            ✅ **Paper size**: 58mm (Sunmi V2s) / 80mm
            ✅ **meshari.tech** developer credit everywhere

            ### Root Cause of Car Search Bug:
            Session cookie was stored in-memory only. When app restarted, cookie was lost
            but app skipped login screen. Now auto-relogins with saved PIN on every app start.

            Developer: meshari.tech
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
