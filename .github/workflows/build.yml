name: Build NJM Worker APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: njm-worker-v6.0-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release v72
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v72
          name: "NJM Worker v6.0 (72) - Full UI/UX Redesign & System Alignment"
          files: app/build/outputs/apk/debug/app-debug.apk
          body: |
            ## NJM Worker App v6.0 (versionCode 72)

            Previous version: v5.0 (versionCode 71) — tag v71 — ROLLBACK AVAILABLE

            ### Changes in v6.0:
            - REDESIGNED: TodayFragment - double-load fix, worker name on receipts, error feedback
            - REDESIGNED: MonthFragment - worker name on receipts, improved loading state
            - FIXED: PrintManager - worker name from SessionManager on all print calls
            - FIXED: PrinterManager - all Arabic strings converted to Unicode escapes (build fix)
            - FIXED: PinLoginActivity - correct XML view IDs (dot1-4, tvError, btnDelete, btnLogin)
            - NEW: InvoiceAdapter - RecyclerView adapter for invoices with correct camelCase model fields
            - NEW: InvoicesFragment - RecyclerView + InvoiceAdapter, loading state, error feedback
            - NEW: item_invoice.xml - invoice card layout (Navy/Gold design)
            - IMPROVED: fragment_invoices.xml - NJM header, RecyclerView layout
            - IMPROVED: fragment_today.xml - 4-column stats card with tvTodayCount
            - IMPROVED: PrintManager - workerName overload for TodayFragment/MonthFragment
            - NEW: NjmApp.kt - tryBindSunmiPrinter uses real PrinterManager.init
            - versionCode: 71 -> 72, versionName: 5.0 -> 6.0

            ### Rollback to v5.0:
            ```
            git checkout v71
            ```
            OR download APK from release v71

            Developer: meshari.tech | NJM Car Wash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
