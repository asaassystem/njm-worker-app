name: Build NJM Worker APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: njm-worker-v6.2-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release v74
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v74
          name: "NJM Worker v6.2 (74) - WhatsApp Invoice Share"
          files: app/build/outputs/apk/debug/app-debug.apk
          body: |
            ## NJM Worker App v6.2 (versionCode 74)
            Previous version: v6.1 (versionCode 73) — tag v73 — ROLLBACK AVAILABLE

            ### Changes in v6.2:
            - NEW: InvoicesFragment - WhatsApp share button for invoices
            - NEW: InvoicesFragment - Generic share sheet (any app) for invoices
            - IMPROVED: Invoice dialog shows WhatsApp + Print + Close buttons
            - IMPROVED: Invoice list item tap shows options menu (WhatsApp / Print / Share)

            ### Rollback to v6.1:
            ```
            git checkout v73
            ```
            OR download APK from release v73

            Developer: meshari.tech | NJM Car Wash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
