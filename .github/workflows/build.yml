name: Build NJM Worker APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: njm-worker-v6.3-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release v75
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v76
          name: "NJM Worker v6.4 (76) - Full API Integration + Invoice Audit"
          files: app/build/outputs/apk/debug/app-debug.apk
          body: |
            ## NJM Worker App v6.3 (versionCode 76)
            Previous version: v6.2 (versionCode 74) — tag v74 — ROLLBACK AVAILABLE

            ### Changes in v6.3:
            - FIXED: App icon updated to NJM official logo (star + arabic najm calligraphy)
            - BACKEND FIX: today-washes-v2 now filters by worker_id (not just org)
            - BACKEND FIX: month-washes-v2 now filters by worker_id (not just org)
            - BACKEND FIX: login sets session user_id for proper wash attribution
            - RESULT: Each worker sees only their own washes (matching website data)

            ### Rollback to v6.2:
            ```
            git checkout v74
            ```

            Developer: meshari.tech | NJM Car Wash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
