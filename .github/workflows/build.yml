name: Build NJM Worker APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: njm-worker-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v65
          name: "NJM Worker v65 - NJM Logo + ZATCA Invoice Settings"
          files: app/build/outputs/apk/debug/app-debug.apk
          body: |
            ## NJM Worker App v65 - Logo + Invoice Design Update

            ### What's New:
            - ✅ NJM Logo (شعار نجم) added everywhere in the app
            - ✅ ZATCA invoice settings (VAT 15%) - org name, VAT number, CR number, address
            - ✅ Sunmi V2s auto-detect button with status indicator
            - ✅ Paper size selection: 58mm (Sunmi V2s default) / 80mm
            - ✅ Auto-print invoice option after wash
            - ✅ Full Arabic/English/Bengali language support
            - ✅ meshari.tech developer credit on all screens
            - ✅ Connected to admincup_njm database via njm.company API

            ### Technical:
            - Sunmi V2s AIDL reflection-based printer binding
            - ZATCA-compliant invoices with 15% VAT
            - SharedPreferences for print/invoice settings persistence

            Developer: meshari.tech
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
