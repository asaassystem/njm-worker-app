name: Build NJM Worker APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: njm-worker-v5.0-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release v71
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v71
          name: "NJM Worker v5.0 (71) - Feature Activation & UI Redesign"
          files: app/build/outputs/apk/debug/app-debug.apk
          body: |
            ## NJM Worker App v5.0 (versionCode 71)
            Previous version: v4.0 (versionCode 70) — tag v70 — ROLLBACK AVAILABLE

            ### Changes in v5.0:
            - FIXED: PinLoginActivity ivLogo ID -> ivAppLogo (crash fix)
            - FIXED: SearchActivity wrong PrintManager import
            - FIXED: Arabic UI throughout SearchActivity
            - ACTIVATED: Invoice system (InvoicesFragment + API verified)
            - ACTIVATED: Receipt printing via PrinterManager AIDL
            - ACTIVATED: Payment toggle in Today and Month fragments
            - REDESIGNED: activity_search.xml - Navy/Gold brand, Arabic RTL
            - versionCode: 70 -> 71, versionName: 4.0 -> 5.0

            ### Rollback to v4.0:
            git checkout v70  OR  download APK from release v70

            Developer: meshari.tech | NJM Car Wash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
