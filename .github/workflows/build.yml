name: Build NJM Worker APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: njm-worker-v6.1-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release v73
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v73
          name: "NJM Worker v6.1 (73) - PIN Fix + Invoice Fix"
          files: app/build/outputs/apk/debug/app-debug.apk
          body: |
            ## NJM Worker App v6.1 (versionCode 73)
            Previous version: v6.0 (versionCode 72) — tag v72 — ROLLBACK AVAILABLE

            ### Changes in v6.1:
            - CRITICAL FIX: PinLoginActivity - send plain 4-digit PIN (not SHA-256 hash)
            - FIXED: WorkerRepository - clean error handling, no broken regex
            - BACKEND FIX: /api/worker/invoices + /api/worker/create-invoice auth (role != worker)
            - BACKEND FIX: invoice endpoints now use worker_org_id session key correctly

            ### Rollback to v6.0:
            ```
            git checkout v72
            ```
            OR download APK from release v72

            Developer: meshari.tech | NJM Car Wash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
