name: Build NJM Worker APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: njm-worker-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v67
          name: "NJM Worker v67 - Fix Car Search + Auto Session"
          files: app/build/outputs/apk/debug/app-debug.apk
          body: |
            ## NJM Worker App v67 - Critical Bug Fixes

            ### What's Fixed:
            ✅ **Car search now works** - Fixed session authentication issue
            ✅ **Auto-relogin on app start** - No more "خطأ بالاتصال" after restart
            ✅ **Sunmi SDK** (com.sunmi:printerlibrary:1.0.23) properly integrated
            ✅ **PrinterManager** uses InnerPrinterManager.getInstance().bindService()
            ✅ **App icon** (NJM gold star) appears on home screen
            ✅ **NJM Logo** visible inside the app
            ✅ **ZATCA invoice settings**: org name, VAT number, CR number, address
            ✅ **Printer auto-detect** button with status indicator
            ✅ **Paper size**: 58mm (Sunmi V2s) / 80mm
            ✅ **meshari.tech** developer credit everywhere

            Developer: meshari.tech
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
